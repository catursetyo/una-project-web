services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: una_project
      POSTGRES_USER: una_project
      POSTGRES_PASSWORD: una_project_local_only
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U una_project -d una_project"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
